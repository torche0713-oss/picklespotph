    function updateUI(u) {
      user = u;
      if (u && u.email === ADMIN_EMAIL) {

        $('importTournamentsBtn').disabled = false;

        $('status').textContent = 'Not admin. Please log in as ' + ADMIN_EMAIL + ' (current: ' + u.email + ')';
        $('status').className = 'error';
      } else {
        $('loginSection').style.display = 'block';
        $('status').textContent = 'Not logged in. Sign in above.';
        $('status').className = '';
      }
    }

    auth.onAuthStateChanged(updateUI);

      const pass = $('passInput').value;

    async function importCourts() {
      $('importCourtsBtn').disabled = true;
      $('importCourtsBtn').textContent = 'Importing...';
      const courtArrays = [getMetroManilaCourts(), getCebuCourts(), getLuzonCourts(), getVisayasCourts(), getMindanaoCourts()];
      const allCourts = courtArrays.flat();
      let success = 0, skipped = 0, errors = 0;

      for (const court of allCourts) {
        try {
          const existing = await db.collection('courts')
            .where('name', '==', court.name)
            .where('city', '==', court.city)
            .get();
          if (!existing.empty) {
            log(`⏭ Skipped (duplicate): ${court.name} - ${court.city}`);
            skipped++;
            continue;
          }

          court.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('courts').add(court);
          log(`✅ Added: ${court.name} - ${court.city}`);
          success++;
        } catch (err) {
          log(`❌ Error adding ${court.name}: ${err.message}`);
          errors++;
        }
      }

      log(`\n=== Import complete ===`);
      log(`Added: ${success} | Skipped: ${skipped} | Errors: ${errors}`);
      $('importCourtsBtn').textContent = 'Import Courts';
      $('importCourtsBtn').disabled = false;
    }

    async function importTournaments() {
      $('importTournamentsBtn').disabled = true;
      $('importTournamentsBtn').textContent = 'Importing...';
      const tournaments = getTournaments();
      let success = 0, skipped = 0, errors = 0;

      for (const t of tournaments) {
        try {
          const existing = await db.collection('tournaments')
            .where('name', '==', t.name)
            .get();
          if (!existing.empty) {
            log(`⏭ Skipped (duplicate): ${t.name}`);
            skipped++;
            continue;
          }

          await db.collection('tournaments').add(t);
          log(`✅ Added tournament: ${t.name}`);
          success++;
        } catch (err) {
          log(`❌ Error adding ${t.name}: ${err.message}`);
          errors++;
        }
      }

      log(`\n=== Import complete ===`);
      log(`Added: ${success} | Skipped: ${skipped} | Errors: ${errors}`);
      $('importTournamentsBtn').textContent = 'Import Tournaments';
      $('importTournamentsBtn').disabled = false;
    }

    $('importCourtsBtn').onclick = importCourts;
    $('importTournamentsBtn').onclick = importTournaments;
