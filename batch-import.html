    async function importCourts() {
      $('importCourtsBtn').disabled = true;
      $('importCourtsBtn').textContent = 'Importing...';
      $('log').textContent = '';
      log('Starting batch import of courts...');

      const allCourts = [
        ...getMetroManilaCourts(),
        ...getCebuCourts()
      ];
      log(`Total courts to import: ${allCourts.length}`);

      let success = 0, skipped = 0, errors = 0;

      for (const court of allCourts) {
        try {
          // Check for duplicate by name (case-insensitive)
          const existing = await db.collection('courts')
            .where('name', '==', court.name)
            .get();
          if (!existing.empty) {
            log(`⏭ Skipped (duplicate): ${court.name}`);
            skipped++;
            continue;
          }

          await db.collection('courts').add({
            ...court,
            verified: false,
            approved: true,
            featured: false,
            photos: [],
            amenities: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          log(`✅ Added: ${court.name} (${court.city}, ${court.province})`);
          success++;
        } catch (err) {
          log(`❌ Error adding ${court.name}: ${err.message}`);
          errors++;
        }
      }

      log(`\n=== Import complete ===`);
      log(`Added: ${success} | Skipped (duplicates): ${skipped} | Errors: ${errors}`);
      $('importCourtsBtn').textContent = 'Import Courts';
      $('importCourtsBtn').disabled = false;
    }

          name: 'Rising Stars: Cebu — U19 Team Event',
          location: 'Cebu City',
          date: '2026-06-20',
          endDate: '2026-06-21',
          type: 'Junior',
          format: 'Team',
          description: 'The Cebu leg of the Rising Stars U19 Team Event, part of Pickle Fest 2026 youth pathway. Showcasing emerging pickleball talent from across the Visayas.',
          contact: '',
          link: 'https://pickleballchampionsleague.org/tournament/rising-stars-cebu',
          ownerId: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        },
        {
          name: 'PlanOut Pickleball Open',
          location: 'Dumaguete City',
          date: '2026-05-15',
          endDate: '2026-05-17',
          type: 'Open',
          format: 'Doubles & Mixed',
          description: 'The biggest pickleball tournament in the Philippines to date with a ₱1M prize pool. Hosted in Dumaguete.',
          contact: '',
          link: '',
          ownerId: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        },
        {
          name: 'GenSan Pickleball Tournament',
          location: 'GMall of GenSan, General Santos City',
          date: '2026-04-11',
          endDate: '2026-04-12',
          type: 'Open',
          format: 'Doubles',
          description: 'Pickleball tournament at GMall of GenSan for all pickleball players.',
          contact: '',
          link: '',
          ownerId: null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }
      ];

      let success = 0, skipped = 0, errors = 0;

      for (const t of tournaments) {
        try {
          // Check for duplicate
          const existing = await db.collection('tournaments')
            .where('name', '==', t.name)
            .get();
          if (!existing.empty) {
            log(`⏭ Skipped (duplicate): ${t.name}`);
            skipped++;
            continue;
          }

          await db.collection('tournaments').add(t);
          log(`✅ Added tournament: ${t.name}`);
          success++;
        } catch (err) {
          log(`❌ Error adding ${t.name}: ${err.message}`);
          errors++;
        }
      }

      log(`\n=== Import complete ===`);
      log(`Added: ${success} | Skipped: ${skipped} | Errors: ${errors}`);
      $('importTournamentsBtn').textContent = 'Import Tournaments';
      $('importTournamentsBtn').disabled = false;
    }

    $('importCourtsBtn').onclick = importCourts;
    $('importTournamentsBtn').onclick = importTournaments;
  </script>
</body>
</html>
