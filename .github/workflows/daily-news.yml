name: Daily Pickleball News Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-news:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PickleSpotPH
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run daily news pipeline
        run: node scripts/run-daily.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push changes
        run: |
          git config user.name "picklespotph-bot"
          git config user.email "bot@picklespotph.site"
          git add js/blog.js blog/ sitemap.xml
          git diff --staged --quiet || git commit -m "Daily news update $(date +'%Y-%m-%d')"
          git push
